services:
  siaru.db:
    image: postgres:16
    container_name: siaru.db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - siaru_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  siaru.web:
    build:
      context: .
      dockerfile: SIARU.Web/Dockerfile
    container_name: siaru.web
    restart: unless-stopped
    depends_on:
      siaru.db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=siaru.db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      AdminSeed__Email: ${SIARU_ADMIN_EMAIL}
      AdminSeed__Password: ${SIARU_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - siaru_dataprotection_keys:/root/.aspnet/DataProtection-Keys

volumes:
  siaru_postgres_data:
  siaru_dataprotection_keys:
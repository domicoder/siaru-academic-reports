services:
    siaru.db:
        image: postgres:16
        container_name: siaru.db
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - '5433:5432'
        volumes:
            - siaru_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}',
                ]
            interval: 5s
            timeout: 5s
            retries: 10

    siaru.web:
        image: mcr.microsoft.com/dotnet/sdk:8.0
        container_name: siaru.web.dev
        working_dir: /src/SIARU.Web
        depends_on:
            siaru.db:
                condition: service_healthy
        environment:
            ASPNETCORE_ENVIRONMENT: Development
            ASPNETCORE_URLS: http://+:8080
            DOTNET_USE_POLLING_FILE_WATCHER: 'true'
            ConnectionStrings__DefaultConnection: Host=siaru.db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
            AdminSeed__Email: ${SIARU_ADMIN_EMAIL}
            AdminSeed__Password: ${SIARU_ADMIN_PASSWORD}
        ports:
            - '8080:8080'
        volumes:
            - ./:/src
            - siaru_nuget_cache:/root/.nuget/packages
        command: >
            sh -c "dotnet restore /src/SIARU.sln &&
                   dotnet watch run --project /src/SIARU.Web/SIARU.Web.csproj --urls http://0.0.0.0:8080"

volumes:
    siaru_postgres_data:
    siaru_nuget_cache:
